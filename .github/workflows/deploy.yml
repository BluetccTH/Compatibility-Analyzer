name: Build and Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
      - master # Triggers on push to either main or master branch

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # Set this in GitHub Repository Secrets
  REGION: asia-east1 # You can change this to your preferred Google Cloud region
  SERVICE_NAME: intj-infp-compatibility-app # The name of your Cloud Run service
  GAR_LOCATION: asia-east1 # Google Artifact Registry location/region

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 1. Authenticate with Google Cloud
      # Supports both Workload Identity Federation (recommended) and Service Account Keys.
      # Configure either GCP_SA_KEY or GCP_WORKLOAD_IDENTITY_PROVIDER in GitHub Secrets.
      - name: Google Cloud Authentication
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          # Alternatively, if using Workload Identity Federation:
          # workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          # service_account: ${{ secrets.GCP_SA_EMAIL }}

      # 2. Setup Google Cloud SDK
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 3. Configure Docker to authenticate with Google Artifact Registry
      - name: Configure Docker Authentication
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # 4. Create Artifact Registry repository if it doesn't exist
      - name: Ensure Artifact Registry Repository Exists
        run: |
          gcloud artifacts repositories create cloud-run-source-deploy \
            --repository-format=docker \
            --location=${{ env.GAR_LOCATION }} \
            --description="Docker repository for Cloud Run deployments" \
            --quiet || true

      # 5. Build and Push the Docker Container
      - name: Build and Push Docker Image
        run: |
          IMAGE_TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # 6. Deploy the Container to Google Cloud Run
      - name: Deploy to Google Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_TAG }}
          # Expose service publicly
          flags: '--allow-unauthenticated'
          # Inject secrets (like GEMINI_API_KEY) if configured in Google Secret Manager, e.g.:
          # secrets: |
          #   GEMINI_API_KEY=GEMINI_API_KEY:latest

      # 7. Print the Deployed App URL
      - name: Show App URL
        run: |
          echo "Successfully deployed to: ${{ steps.deploy.outputs.url }}"
